<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ระบบธนาคารขยะตำบลอุโมงค์</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Anuphan', sans-serif !important;
        }
    </style>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body class="bg-[#f8fafc]">

    <div id="root">
        <div class="flex min-h-screen bg-[#f8fafc] font-sans">

            <aside
                class="hidden md:flex w-72 flex-col bg-gradient-to-b from-emerald-500 to-emerald-700 p-6 shadow-2xl shrink-0 h-screen border-r border-emerald-600/30">
                <div class="flex flex-col items-center gap-3 mb-6 border-b border-white/30 pb-6 mt-2 animate-pulse">
                    <div class="bg-white/20 w-16 h-16 rounded-2xl"></div>
                    <div class="w-40 h-5 bg-white/20 rounded-md mt-1"></div>
                    <div class="w-24 h-3 bg-white/20 rounded-md"></div>
                </div>
                <div class="flex flex-col gap-3 animate-pulse">
                    <div class="w-full h-14 bg-white shadow-md rounded-xl"></div>
                    <div class="w-full h-14 bg-white/10 rounded-xl"></div>
                    <div class="w-full h-14 bg-white/10 rounded-xl"></div>
                    <div class="w-full h-14 bg-white/10 rounded-xl"></div>
                </div>
            </aside>

            <main class="flex-1 flex flex-col min-w-0 min-h-screen overflow-x-hidden">

                <header
                    class="hidden md:flex bg-white border-b border-slate-100 px-8 py-5 items-center justify-between shadow-sm animate-pulse">
                    <div class="w-48 h-6 bg-slate-200 rounded-md"></div>
                    <div class="w-28 h-10 bg-slate-100 rounded-xl"></div>
                </header>

                <div class="flex-grow p-4 md:p-8 max-w-[1600px] w-full mx-auto space-y-6">

                    <div
                        class="bg-white p-5 sm:p-6 rounded-3xl border border-slate-200 shadow-sm flex flex-col lg:flex-row justify-between items-start lg:items-center gap-5 animate-pulse">
                        <div>
                            <div class="w-40 h-6 bg-slate-200 rounded-md mb-2"></div>
                            <div class="w-48 h-4 bg-emerald-50 rounded-md"></div>
                        </div>
                        <div class="flex gap-3">
                            <div class="w-32 h-12 bg-slate-50 border border-slate-100 rounded-xl"></div>
                            <div class="w-32 h-12 bg-slate-50 border border-slate-100 rounded-xl"></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 lg:grid-cols-5 gap-4">
                        <div
                            class="bg-white h-[130px] rounded-3xl border border-slate-100 p-5 flex flex-col justify-center animate-pulse">
                            <div class="w-12 h-12 bg-blue-50 rounded-2xl mb-3"></div>
                            <div class="w-20 h-3 bg-slate-100 mb-2 rounded-sm"></div>
                            <div class="w-24 h-6 bg-slate-200 rounded-md"></div>
                        </div>
                        <div
                            class="bg-white h-[130px] rounded-3xl border border-slate-100 p-5 flex flex-col justify-center animate-pulse">
                            <div class="w-12 h-12 bg-blue-50 rounded-2xl mb-3"></div>
                            <div class="w-20 h-3 bg-slate-100 mb-2 rounded-sm"></div>
                            <div class="w-24 h-6 bg-slate-200 rounded-md"></div>
                        </div>
                        <div
                            class="hidden lg:flex bg-white h-[130px] rounded-3xl border border-slate-100 p-5 flex-col justify-center animate-pulse">
                            <div class="w-12 h-12 bg-blue-50 rounded-2xl mb-3"></div>
                            <div class="w-20 h-3 bg-slate-100 mb-2 rounded-sm"></div>
                            <div class="w-24 h-6 bg-slate-200 rounded-md"></div>
                        </div>
                        <div
                            class="hidden lg:flex bg-white h-[130px] rounded-3xl border border-slate-100 p-5 flex-col justify-center animate-pulse">
                            <div class="w-12 h-12 bg-blue-50 rounded-2xl mb-3"></div>
                            <div class="w-20 h-3 bg-slate-100 mb-2 rounded-sm"></div>
                            <div class="w-24 h-6 bg-slate-200 rounded-md"></div>
                        </div>
                        <div
                            class="hidden lg:flex bg-white h-[130px] rounded-3xl border border-slate-100 p-5 flex-col justify-center animate-pulse">
                            <div class="w-12 h-12 bg-emerald-50 rounded-2xl mb-3"></div>
                            <div class="w-20 h-3 bg-slate-100 mb-2 rounded-sm"></div>
                            <div class="w-24 h-6 bg-slate-200 rounded-md"></div>
                        </div>
                    </div>

                    <div class="hidden sm:flex flex-col lg:flex-row gap-6 animate-pulse">
                        <div
                            class="lg:w-[70%] w-full h-[400px] bg-white rounded-3xl border border-slate-100 p-6 flex flex-col">
                            <div class="w-64 h-6 bg-slate-200 rounded-md mb-6"></div>
                            <div
                                class="flex-1 bg-slate-50 rounded-2xl border border-slate-100 flex items-center justify-center">
                                <div class="w-48 h-48 rounded-full border-[16px] border-slate-200"></div>
                            </div>
                        </div>
                        <div
                            class="lg:w-[30%] w-full h-[400px] bg-white rounded-3xl border border-slate-100 p-6 flex flex-col">
                            <div class="w-40 h-6 bg-slate-200 rounded-md mb-6"></div>
                            <div class="flex flex-col gap-3">
                                <div class="w-full h-[60px] bg-slate-50 border-l-[6px] border-amber-200 rounded-2xl">
                                </div>
                                <div class="w-full h-[60px] bg-slate-50 border-l-[6px] border-slate-200 rounded-2xl">
                                </div>
                                <div class="w-full h-[60px] bg-slate-50 border-l-[6px] border-orange-200 rounded-2xl">
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
